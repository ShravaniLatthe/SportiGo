<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link rel="stylesheet" href="{{url_for('static',filename='bootstrap.min.css')}}">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e3a8a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn-login{
            width:100%;
            background:#1e3a8a;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#0f172a;
            color:white;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>🔐 Admin Login</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password"
                   name="pass"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-login">
            Login
        </button>

        <div class="text-center mt-3">
            <a href="{{url_for('index')}}">
                Back To Home
            </a>
        </div>

    </form>

</div>

</body>
</html>
