{% extends "adminbase.html" %}
{% block body %}

<div class="container">
    <form action="{{url_for('category')}}" method="POST" enctype="multipart/form-data">
    <center><h2>Add Category</h2></center>
    <div class="row">
        <div class="col-sm-12">
            <label>Category Name:<span>*</span></label>
            <input type="text" name="c_name" placeholder="Enter Category Name " class="form-control" required>
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col-sm-12">
            <label>Category Image:<span>*</span></label>
            <input type="file" name="c_image" class="form-control" required>
        </div>
    </div>
    <br>
      <div class="row">
        <div class="col-sm-12">
            <label>Category Description:</label>
            <input type="text" placeholder="Enter Category Description" name="c_desc" class="form-control">
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col-sm-12">
            <input type="submit" name="btn" value="Add" class="btn btn-primary">
            <input type="reset" name="btn" value="Cancel" class="btn btn-danger">

        </div>
    </div>
    <br>
    </form>
    <form action="{{ url_for('view_category') }}">
        <input type="submit" name="btn" value="View Category" class="btn btn-primary" style="background-color:darkred">
    </form>
</div>
{% endblock %}
