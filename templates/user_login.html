<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>

    <link rel="stylesheet" href="{{url_for('static',filename='bootstrap.min.css')}}">

    <style>

        body{
            background:url("{{ url_for('static', filename='sportsbg.jpg') }}");
            background-size:cover;
            background-position:center;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:450px;
            background:rgba(255,255,255,0.95);
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
        }

        h2{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn-login{
            width:100%;
            background:#f59e0b;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#d97706;
            color:white;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2> User Login</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password"
                   name="pass"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-login">
            Login
        </button>

        <div class="text-center mt-3">

            <a href="{{url_for('userregister')}}">
                New User? Register Here
            </a>

        </div>

    </form>

</div>

</body>
</html>
