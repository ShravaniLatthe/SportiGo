{% extends "userbase.html" %}

{% block body %}

<div class="container mt-5">

    <h2 class="text-center mb-5 fw-bold">
        Sports Categories
    </h2>

    <div class="row justify-content-center">

        {% for row in value %}

        <div class="col-lg-4 col-md-6 mb-4">

            <div class="card shadow category-card">

                <img src="{{ row[2] }}"
                     class="card-img-top category-img">

                <div class="card-body text-center">

                    <h4 class="fw-bold">
                        {{ row[1] }}
                    </h4>

                    <p>
                        {{ row[3] }}
                    </p>

                    <a href="{{ url_for('category_products',
                        category_id=row[0]) }}"
                        class="btn btn-primary">
                            View Products
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<style>

.category-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    transition:0.4s;
    height:100%;
}

.category-card:hover{
    transform:translateY(-8px);
    box-shadow:0px 10px 25px rgba(0,0,0,0.2);
}

.category-img{
    height:250px;
    width:100%;
    object-fit:cover;
}

</style>

{% endblock %}
