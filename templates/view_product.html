{% extends "userbase.html" %}

{% block body %}

<div class="container mt-4">

    <h1 class="text-center mb-5 fw-bold">
         Sports Collection
    </h1>

    <div class="row">

        {% for row in value %}

        <div class="col-lg-4 col-md-6 mb-4">

            <div class="card product-card shadow">

                <img src="{{ url_for('static',
                filename='uploads/' + row[5]) }}"
                class="card-img-top product-img">

                <div class="card-body text-center">

                    <h4 class="fw-bold">
                        {{ row[1] }}
                    </h4>

                    <p class="text-muted">
                        {{ row[4] }}
                    </p>

                    <h5 class="text-success fw-bold">
                        ₹{{ row[3] }}
                    </h5>

                    <span class="badge bg-danger">
                        {{ row[6] }}% OFF
                    </span>

                    <br><br>

                    <a href="{{ url_for('product_details',
                    p_id=row[0]) }}"
                    class="btn btn-primary">
                        View Details
                    </a>

                    <a href="{{ url_for('add_to_cart',
                    p_id=row[0]) }}"
                    class="btn btn-warning">
                        Cart
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<style>

.product-card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    transition:0.4s;
}

.product-card:hover{
    transform:translateY(-10px);
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

.product-img{
    height:280px;
    object-fit:cover;
}

.card-body{
    background:#fff;
}

.btn{
    border-radius:25px;
    font-weight:bold;
}

h1{
    color:#0A2647;
}

</style>

{% endblock %}
